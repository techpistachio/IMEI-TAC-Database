openapi: 3.0.3
info:
  title: TACDatabase Public API
  version: 1.0.0
  description: Public TAC lookup API with API-key authentication.
servers:
  - url: https://api.yourdomain.com
paths:
  /v1/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /v1/tac/{imeiOrTac}:
    get:
      summary: Lookup a TAC or IMEI
      security:
        - ApiKeyAuth: []
      parameters:
        - name: imeiOrTac
          in: path
          required: true
          schema:
            type: string
            oneOf:
              - pattern: '^[0-9]{8}$'
              - pattern: '^[0-9]{14,15}$'
      responses:
        "200":
          description: TAC found
        "401":
          description: Invalid or missing API key
        "404":
          description: TAC not found
        "429":
          description: Rate limit exceeded
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
